<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Planner</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="pomobar" class="pomobar hidden"></div>
  <header class="topbar">
    <h1 id="view-title">Planner</h1>
    <div class="topbar-actions">
      <button id="btn-theme" class="neo-btn icon-btn" title="Theme">◐</button>
      <button id="btn-settings" class="neo-btn icon-btn" title="Settings">⚙</button>
    </div>
  </header>

  <main id="view" class="view"></main>

  <nav class="bottomnav">
    <button class="nav-btn" data-view="today"><span class="nav-ico">📅</span><span class="nav-lbl" data-i18n="today"></span></button>
    <button class="nav-btn" data-view="week"><span class="nav-ico">🗓️</span><span class="nav-lbl" data-i18n="week"></span></button>
    <button class="nav-btn" data-view="notes"><span class="nav-ico">📝</span><span class="nav-lbl" data-i18n="notes"></span></button>
    <button class="nav-btn" data-view="goals"><span class="nav-ico">🎯</span><span class="nav-lbl" data-i18n="goals"></span></button>
    <button class="nav-btn" data-view="stats"><span class="nav-ico">📊</span><span class="nav-lbl" data-i18n="stats"></span></button>
  </nav>

  <div id="modal-root"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
