<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Planner</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <svg style="display:none" xmlns="http://www.w3.org/2000/svg">
    <symbol id="i-today" viewBox="0 0 24 24"><rect x="3.5" y="5" width="17" height="15.5" rx="4"/><path d="M3.5 9.5h17M8 3v3.5M16 3v3.5"/><circle cx="12" cy="15" r="1.6" fill="currentColor" stroke="none"/></symbol>
    <symbol id="i-week" viewBox="0 0 24 24"><rect x="3.5" y="5" width="17" height="15.5" rx="4"/><path d="M3.5 9.5h17M8 3v3.5M16 3v3.5M7.5 13.5h4M7.5 17h7"/></symbol>
    <symbol id="i-notes" viewBox="0 0 24 24"><path d="M6 3.5h9.5L20 8v10.5a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 18.5v-12A2.5 2.5 0 0 1 6.5 4"/><path d="M15 3.5V8h4.5M8.5 12.5h7M8.5 16h4.5"/></symbol>
    <symbol id="i-goals" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"/></symbol>
    <symbol id="i-stats" viewBox="0 0 24 24"><path d="M5 20V13M12 20V6M19 20v-9.5"/></symbol>
    <symbol id="i-theme" viewBox="0 0 24 24"><path d="M20 13.2A8 8 0 1 1 10.8 4 6.3 6.3 0 0 0 20 13.2Z"/></symbol>
    <symbol id="i-settings" viewBox="0 0 24 24"><path d="M4 8h9M17 8h3M4 16h3M11 16h9"/><circle cx="15" cy="8" r="2.2"/><circle cx="9" cy="16" r="2.2"/></symbol>
    <symbol id="i-check" viewBox="0 0 24 24"><path d="M5 12.5 10 17.5 19 7"/></symbol>
    <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="6.5"/><path d="m20 20-4.4-4.4"/></symbol>
    <symbol id="i-pin" viewBox="0 0 24 24"><path d="M12 21v-5M7 16l1.2-6.5L6.5 7h11l-1.7 2.5L17 16H7Z"/></symbol>
    <symbol id="i-repeat" viewBox="0 0 24 24"><path d="M17 2.5 20 5.5l-3 3"/><path d="M4 11V9.5A4 4 0 0 1 8 5.5h12M7 21.5 4 18.5l3-3"/><path d="M20 13v1.5a4 4 0 0 1-4 4H4"/></symbol>
  </svg>

  <div id="pomobar" class="pomobar hidden"></div>
  <header class="topbar">
    <h1 id="view-title">Planner</h1>
    <div class="topbar-actions">
      <button id="btn-theme" class="neo-btn icon-btn" title="Theme"><svg class="ic"><use href="#i-theme"/></svg></button>
      <button id="btn-settings" class="neo-btn icon-btn" title="Settings"><svg class="ic"><use href="#i-settings"/></svg></button>
    </div>
  </header>

  <main id="view" class="view"></main>

  <nav class="bottomnav">
    <button class="nav-btn" data-view="today"><svg class="ic"><use href="#i-today"/></svg><span class="nav-lbl" data-i18n="today"></span></button>
    <button class="nav-btn" data-view="week"><svg class="ic"><use href="#i-week"/></svg><span class="nav-lbl" data-i18n="week"></span></button>
    <button class="nav-btn" data-view="notes"><svg class="ic"><use href="#i-notes"/></svg><span class="nav-lbl" data-i18n="notes"></span></button>
    <button class="nav-btn" data-view="goals"><svg class="ic"><use href="#i-goals"/></svg><span class="nav-lbl" data-i18n="goals"></span></button>
    <button class="nav-btn" data-view="stats"><svg class="ic"><use href="#i-stats"/></svg><span class="nav-lbl" data-i18n="stats"></span></button>
  </nav>

  <div id="modal-root"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
